<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#d0cfc7;border-radius:3px}
.header{background:#fff;border-bottom:1px solid #e8e6df;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-logo{font-size:15px;font-weight:600;color:#6B2D3E;letter-spacing:-.3px}
.header-sub{font-size:11px;color:#999}
.content{flex:1;overflow-y:auto}
.nav{background:#fff;border-top:1px solid #e8e6df;display:flex;flex-shrink:0}
.nav-btn{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-size:10px;color:#aaa;transition:color .15s;font-family:inherit}
.nav-btn.active{color:#6B2D3E;font-weight:500}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* Cards */
.card{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.card-tap{cursor:pointer;transition:opacity .1s;-webkit-user-select:none}
.card-tap:active{opacity:.7}
.section-label{padding:12px 16px 5px;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em}
/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-rest{background:#e1f5ee;color:#0f6e56}
.badge-get{background:#e6f1fb;color:#185fa5}
.badge-hot{background:#faeeda;color:#854f0b}
.badge-dig{background:#f1efe8;color:#5f5e5a}
.badge-a{background:#fcebeb;color:#a32d2d;font-weight:700}
.badge-b{background:#faeeda;color:#854f0b}
.badge-c{background:#f1efe8;color:#5f5e5a}
.badge-nrw{background:#eeedfe;color:#534ab7}
.badge-status{padding:3px 6px;border-radius:12px;font-size:10px;border:none;cursor:pointer;font-family:inherit;outline:none;flex-shrink:0;max-width:108px}
/* Input */
input[type=text],select,textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid #e0ddd5;border-radius:8px;background:#f8f7f4;color:#1a1a18;outline:none;font-family:inherit}
input[type=text]:focus,select:focus{border-color:#6B2D3E;background:#fff}
textarea{resize:none}
/* Pills */
.pills{overflow-x:auto;white-space:nowrap;padding:8px 16px 8px 16px;background:#fff;border-bottom:1px solid #e8e6df;-ms-overflow-style:none;scrollbar-width:none}
.pills::after{content:'';display:inline-block;width:24px;flex-shrink:0}
.pills::-webkit-scrollbar{display:none}
.pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #e0ddd5;margin-right:6px;background:transparent;color:#888;font-family:inherit;transition:all .15s}
.pill.on{background:#6B2D3E;color:#fff;border-color:#6B2D3E;font-weight:500}
/* Top sticky search area */
.search-bar{background:#fff;border-bottom:1px solid #e8e6df;padding:10px 16px;position:sticky;top:0;z-index:5}
/* Stat cards */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
.stat{background:#fff;border:1px solid #e8e6df;border-radius:10px;padding:12px}
.stat-val{font-size:24px;font-weight:600;color:#6B2D3E;margin:4px 0 2px}
.stat-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.04em}
.stat-sub{font-size:11px;color:#bbb}
/* Day tabs */
.day-tabs{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #e8e6df;flex-shrink:0}
.day-tab{flex:1;padding:7px 2px;font-size:11px;border-radius:8px;cursor:pointer;text-align:center;border:1px solid #e0ddd5;background:transparent;color:#888;font-family:inherit;transition:all .15s}
/* Product tabs */
.prod-tabs{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e8e6df}
.prod-tab{flex:1;padding:9px;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;text-align:center;border:1px solid #e0ddd5;background:transparent;color:#888;font-family:inherit;transition:all .15s}
.prod-tab.on{background:#6B2D3E;color:#fff;border-color:#6B2D3E}
/* Strategy box */
.strategy{border-left:3px solid #6B2D3E;background:#fff;padding:12px 14px;border-radius:0 10px 10px 0;margin-bottom:8px}
/* Priority indicator */
.prio-a{border-left:3px solid #e24b4a}
.prio-b{border-left:3px solid #ba7517}
.prio-c{border-left:3px solid #888}
/* Back button */
.back-btn{font-size:20px;background:none;border:none;cursor:pointer;color:#6B2D3E;padding:0;line-height:1;margin-right:4px}
/* Visit form */
.form-label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-row{margin-bottom:10px}
.btn-save{width:100%;padding:11px;font-size:13px;font-weight:600;background:#6B2D3E;color:#fff;border:none;border-radius:8px;cursor:pointer}
.btn-ghost{padding:9px 16px;font-size:13px;border:1px solid #e0ddd5;border-radius:8px;background:none;color:#888;cursor:pointer;font-family:inherit}
.btn-add{width:100%;padding:12px;font-size:13px;font-weight:500;border:1px dashed #c0bdb5;border-radius:10px;background:none;cursor:pointer;color:#888;font-family:inherit;margin-top:4px}
/* Visit result badges */
.r-Sipariş{background:#eaf3de;color:#3b6d11}
.r-Takip{background:#faeeda;color:#854f0b}
.r-İlgisiz{background:#fcebeb;color:#a32d2d}
.r-Yoktu{background:#f1efe8;color:#5f5e5a}
/* Placeholder */
.empty{text-align:center;padding:32px 20px;color:#bbb;font-size:13px;line-height:1.7}
/* Contact info */
.contact-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f0ede8;font-size:12px;width:100%}
.contact-key{color:#999;min-width:55px;flex-shrink:0}
.contact-val{color:#1a1a18;flex:1;min-width:0;word-break:break-word;overflow-wrap:break-word}
.contact-val a{color:#6B2D3E;text-decoration:none;word-break:break-all}

<script>

// ====== GOOGLE SHEETS SYNC ======
const API = 'https://script.google.com/macros/s/AKfycbxH45N7dmQ-vQEQOKb81PjbGmTrJLsFB-1awvgutbNFeqjcOvUlMz4lT1c5QPKEBPCs/exec';

function apiCall(params, onSuccess, onError) {
  const qs = Object.entries(params).map(function(kv) {
    return kv[0] + '=' + encodeURIComponent(typeof kv[1] === 'object' ? JSON.stringify(kv[1]) : kv[1]);
  }).join('&');
  fetch(API + '?' + qs)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.error) { if(onError) onError(data.error); }
      else { if(onSuccess) onSuccess(data); }
    })
    .catch(function(err){ if(onError) onError(err.toString()); });
}

function setSyncStatus(status) {
  var el = document.getElementById('sync-indicator');
  if (!el) return;
  var map = {
    idle:    {text:'●', color:'#bbb', title:'Bağlantı bekleniyor'},
    syncing: {text:'↻', color:'#ba7517', title:'Senkronize ediliyor...'},
    ok:      {text:'●', color:'#3b6d11', title:'Google Sheets ile senkronize'},
    error:   {text:'●', color:'#e24b4a', title:'Bağlantı hatası — veriler lokal kaydedildi'}
  };
  var st = map[status] || map.idle;
  el.textContent = st.text;
  el.style.color = st.color;
  el.title = st.title;
}

function loadFromSheets() {
  setSyncStatus('syncing');
  apiCall({action:'getVisits'}, function(data) {
    if (data.visits && data.visits.length) {
      data.visits.forEach(function(v) {
        var cid = Number(v.customerId);
        if (!state.visits[cid]) state.visits[cid] = [];
        if (!state.visits[cid].find(function(x){ return x.id == v.id; })) {
          state.visits[cid].push({id: v.id, date: v.date, result: v.result, note: v.note || ''});
        }
      });
    }
    setSyncStatus('ok');
    render();
  }, function(err) {
    setSyncStatus('error');
    console.warn('Sheets error:', err);
  });

  apiCall({action:'getManualPots'}, function(data) {
    if (data.potentials && data.potentials.length) {
      manualPotentials = data.potentials.map(function(p) {
        return {
          id: p.id, cat: p.cat, name: p.name, city: p.city,
          addr: p.addr || '', phone: p.phone || '', email: p.email || '',
          contact: p.contact || '', buying: p.buying || '', note: p.note || '',
          prio: p.prio || 'B', status: p.status || 'Aranmadı',
          nrw: p.nrw === 'true' || p.nrw === true
        };
      });
    }
  }, function(){});
}

function saveVisitToSheets(customerId, visit) {
  setSyncStatus('syncing');
  apiCall({
    action: 'saveVisit',
    id: visit.id,
    customerId: customerId,
    date: visit.date,
    result: visit.result,
    note: visit.note || ''
  }, function(){ setSyncStatus('ok'); }, function(){ setSyncStatus('error'); });
}

function saveManualPotToSheets(pot) {
  setSyncStatus('syncing');
  apiCall({
    action: 'saveManualPot',
    id: pot.id, cat: pot.cat, name: pot.name, city: pot.city,
    addr: pot.addr || '', phone: pot.phone || '', email: pot.email || '',
    contact: pot.contact || '', buying: pot.buying || '', note: pot.note || '',
    prio: pot.prio, status: pot.status, nrw: pot.nrw
  }, function(){ setSyncStatus('ok'); }, function(){ setSyncStatus('error'); });
}

function savePotStatusToSheets(id, status) {
  apiCall({action:'updatePotStatus', id: id, status: status},
    function(){ setSyncStatus('ok'); }, function(){ setSyncStatus('error'); });
}

function detectType(name){
  const n=name.toLowerCase();
  if(/restaurant|rest\.|gastro|kebab|sofra|meyhane|lounge|caf[eé]|bistro|meze|steak|fisch|grill|dining|kantine|ocakbasi|adana|döner|divan|zeitlos|trüffel|mare|fasil|savarona|sultan|nasip|pirzola|pera|bosporus|kuyu|sumack|alaturka|shiraz|esskultürk|anka event|foodkult|bigchef|theaterbar|taverna|tokotis|tile|lokanta|bar\b|doppelherz|saki|melo|yakamoz|balkan/.test(n)) return 'R';
  if(/trinkhalle|getränke|kiosk|abholmarkt|minimarkt|depot|wein.depot|wein werk|wein.handel|wein.gmbh|feinkost|grosshandel|großhandel|handel\b|import|export|spirits|drinks|lebensmittel|food\b|market|markt\b|supermarkt/.test(n)) return 'G';
  if(/hotel/.test(n)) return 'H';
  return 'D';
}

function saveVisit(id){
  const result=document.getElementById('vres').value;

function initDayCfg(day){
  if(!state.routeConfig[day]) state.routeConfig[day]={cities:[],extra:[],selCustomers:{},selPotentials:{}};
  if(!state.routeConfig[day].selCustomers) state.routeConfig[day].selCustomers={};
  if(!state.routeConfig[day].selPotentials) state.routeConfig[day].selPotentials={};
  if(!state.routeConfig[day].extra) state.routeConfig[day].extra=[];
}

function addRouteCity(day,city){
  initDayCfg(day);
  if(!state.routeConfig[day].cities.includes(city))
    state.routeConfig[day].cities.push(city);
  state.citySearchStr='';
  renderRoutes(document.getElementById('content'));
}

function removeRouteCity(day,city){
  initDayCfg(day);
  state.routeConfig[day].cities=state.routeConfig[day].cities.filter(c=>c!==city);
  renderRoutes(document.getElementById('content'));
}

function toggleCust(day,id,val){
  initDayCfg(day);
  state.routeConfig[day].selCustomers[id]=val;
  renderRoutes(document.getElementById('content'));
}

function togglePot(day,id,val){
  initDayCfg(day);
  state.routeConfig[day].selPotentials[id]=val;
  renderRoutes(document.getElementById('content'));
}

function selectAllCustomers(day){
  initDayCfg(day);
  const cities=state.routeConfig[day].cities;
  CUSTOMERS.filter(c=>cities.includes(c.city)).forEach(c=>state.routeConfig[day].selCustomers[c.id]=true);
  renderRoutes(document.getElementById('content'));
}
function deselectAllCustomers(day){
  initDayCfg(day);
  const cities=state.routeConfig[day].cities;
  CUSTOMERS.filter(c=>cities.includes(c.city)).forEach(c=>state.routeConfig[day].selCustomers[c.id]=false);
  renderRoutes(document.getElementById('content'));
}
function selectAllPots(day){
  initDayCfg(day);
  const cities=state.routeConfig[day].cities;
  const allPots=[...POTENTIALS,...manualPotentials];
  allPots.filter(p=>cities.includes(p.city)&&p.cat!=='🔔 Uyandırılacak Müşteriler').forEach(p=>state.routeConfig[day].selPotentials[p.id]=true);
  renderRoutes(document.getElementById('content'));
}
function deselectAllPots(day){
  initDayCfg(day);
  const cities=state.routeConfig[day].cities;
  const allPots=[...POTENTIALS,...manualPotentials];
  allPots.filter(p=>cities.includes(p.city)&&p.cat!=='🔔 Uyandırılacak Müşteriler').forEach(p=>state.routeConfig[day].selPotentials[p.id]=false);
  renderRoutes(document.getElementById('content'));
}

function addExtraCustomer(day){
  initDayCfg(day);
  var val=document.getElementById('extra-inp')?document.getElementById('extra-inp').value.trim():'';
  if(!val) return;
  state.routeConfig[day].extra.push(val);
  renderRoutes(document.getElementById('content'));
}

function removeExtra(day,idx){
  initDayCfg(day);
  state.routeConfig[day].extra.splice(idx,1);
  renderRoutes(document.getElementById('content'));
}

function sendRouteMail(day){
  initDayCfg(day);
  const cfg=state.routeConfig[day];
  const cities=cfg.cities;
  if(!cities.length){alert('Önce en az bir şehir seç!');return;}

  const sc=cfg.selCustomers||{};
  const sp=cfg.selPotentials||{};
  const allPots=[...POTENTIALS,...manualPotentials];

  let body='KOENIGS DRINKS — '+day.toUpperCase()+' ROTA RAPORU\n';
  body+='Tarih: '+new Date().toLocaleDateString('de-DE')+'\n';
  body+='Şehirler: '+cities.join(', ')+'\n';
  body+='='.repeat(50)+'\n';

  // Seçili müşteriler
  const selCusts=CUSTOMERS.filter(c=>cities.includes(c.city)&&sc[c.id]!==false);
  if(selCusts.length){
    body+='\nMÜŞTERİLER ('+selCusts.length+' seçili)\n'+'-'.repeat(40)+'\n';
    cities.forEach(function(city){
      const cc=selCusts.filter(c=>c.city===city);
      if(!cc.length) return;
      body+='\n📍 '+city+'\n';
      cc.forEach(function(c){
        body+='  • '+c.name+'\n';
        if(c.plz) body+='    PLZ: '+c.plz+' '+c.city+'\n';
        if(c.phone) body+='    Tel: '+c.phone+'\n';
        const od=OD[c.id];
        if(od){
          body+='    Son Sipariş: '+od.d+' ('+od.g+' gün önce)\n';
          body+='    Toplam Ciro: '+od.c.toLocaleString()+' €  |  '+od.s+' fatura  |  Ort. '+od.a+' günde bir\n';
        }
        const vis=(state.visits[c.id]||[]);
        if(vis.length){
          body+='    Ziyaret Notları:\n';
          vis.forEach(function(v){
            body+='      ['+v.date+'] '+v.result+(v.note?' — '+v.note:'')+'\n';
          });
        }
        body+='\n';
      });
    });
  }

  // Seçili potansiyeller
  const selPots=allPots.filter(p=>cities.includes(p.city)&&p.cat!=='🔔 Uyandırılacak Müşteriler'&&sp[p.id]!==false);
  if(selPots.length){
    body+='\nPOTANSİYEL HEDEFLER ('+selPots.length+' seçili)\n'+'-'.repeat(40)+'\n';
    cities.forEach(function(city){
      const pp=selPots.filter(p=>p.city===city);
      if(!pp.length) return;
      body+='\n📍 '+city+'\n';
      pp.forEach(function(p){
        body+='  ★ ['+p.prio+'] '+p.name+' — '+p.cat+'\n';
        if(p.addr) body+='    Adres: '+p.addr+'\n';
        if(p.phone) body+='    Tel: '+p.phone+'\n';
        if(p.email) body+='    E-Mail: '+p.email+'\n';
        if(p.contact) body+='    Kişi: '+p.contact+'\n';
        if(p.note) body+='    Not: '+p.note+'\n';
        body+='\n';
      });
    });
  }

  if(cfg.extra&&cfg.extra.length){
    body+='\nEKSTRA NOTLAR\n'+'-'.repeat(40)+'\n';
    cfg.extra.forEach(function(e){body+='  • '+e+'\n';});
  }

  body+='\n---\nKoenigs Drinks CRM | bertan.unsal@koenigs-drinks.de';

  const sub='Koenigs '+day+' Rotası — '+cities.join(', ')+' — '+new Date().toLocaleDateString('de-DE');
  window.open('mailto:bertan.unsal@koenigs-drinks.de?subject='+encodeURIComponent(sub)+'&body='+encodeURIComponent(body));
}

  {brand:'Porta Caeli',name:'Sestos',grape:'Kalecik Karası-Öküzgözü-Boğazkere',vol:'75cl',alc:'13%',price:28.90,caseQty:6,casePrice:173.40},
  {brand:'Mystic Muse',name:'Çilek Şarabı',grape:'Strawberry Wine',vol:'75cl',alc:'12%',price:7.90,caseQty:6,casePrice:47.40}
];



function renderProducts(el){
  const items=state.prodTab==='raki'?RAKI:WINE;
  const brands=[...new Set(items.map(p=>p.brand))];
  el.innerHTML=`
<div class="prod-tabs">
  <button class="prod-tab${state.prodTab==='raki'?' on':''}" onclick="state.prodTab='raki';render()">🥃 Rakı</button>
  <button class="prod-tab${state.prodTab==='wine'?' on':''}" onclick="state.prodTab='wine';render()">🍷 Türk Şarap</button>
</div>
${brands.map(brand=>{
  const bi=items.filter(p=>p.brand===brand);
  return `<div class="section-label">${brand}</div>
<div style="padding:0 16px">${bi.map(p=>`<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div style="flex:1;margin-right:12px">
      <div style="font-size:13px;font-weight:600">${p.name} <span style="font-weight:400;color:#bbb;font-size:12px">${p.vol}</span></div>
      ${p.grape?`<div style="font-size:12px;color:#888;margin-top:2px">${p.grape}</div>`:''}
      <div style="font-size:11px;color:#bbb;margin-top:2px">Alc. ${p.alc} · ${p.caseQty}x / koli</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-size:15px;font-weight:600;color:#6B2D3E">${p.price.toFixed(2)} €</div>
      <div style="font-size:11px;color:#bbb">${p.casePrice.toFixed(2)} € / koli</div>
    </div>
  </div>
</div>`).join('')}</div>`;
}).join('')}`;
}

// ---- POTENTIALS ----
const POT_CATS=['Tümü',...[...new Set([...POTENTIALS,...manualPotentials].map(p=>p.cat))]];
const POT_PRIOS=['Tümü','A','B','C'];
const STATUS_STYLES={'Aranmadı':{bg:'#f1efe8',c:'#5f5e5a'},'İletişime Geçildi':{bg:'#faeeda',c:'#854f0b'},'İlgileniyor':{bg:'#e1f5ee',c:'#0f6e56'},'Takipte':{bg:'#e6f1fb',c:'#185fa5'},'Aktif Müşteri':{bg:'#eaf3de',c:'#3b6d11'}};
let potState={...POTENTIALS.reduce((a,p)=>({...a,[p.id]:p.status}),{})};

function renderPotentials(el){
  const sr=state.potSearch.toLowerCase();
  const allPots=[...POTENTIALS,...manualPotentials];
  const dormant=allPots.filter(p=>p.cat==='🔔 Uyandırılacak Müşteriler'&&(potState[p.id]||p.status)!=='Aktif Müşteri');
  const targets=allPots.filter(p=>p.cat!=='🔔 Uyandırılacak Müşteriler'&&(potState[p.id]||p.status)!=='Aktif Müşteri');

  var filtered;
  if(state.potView==='dormant'){
    filtered=dormant.filter(p=>{
      const srOk=!sr||p.name.toLowerCase().includes(sr)||p.city.toLowerCase().includes(sr);
      return srOk;
    });
  } else {
    filtered=targets.filter(p=>{
      const catOk=state.potCat==='Tümü'||p.cat===state.potCat;
      const prioOk=state.potPrio==='Tümü'||p.prio===state.potPrio;
      const srOk=!sr||p.name.toLowerCase().includes(sr)||p.city.toLowerCase().includes(sr)||p.note.toLowerCase().includes(sr)||(p.contact||'').toLowerCase().includes(sr);
      return catOk&&prioOk&&srOk;
    });
  }
  const aCount=filtered.filter(p=>p.prio==='A').length;
  const targetCats=['Tümü',...[...new Set(targets.map(p=>p.cat))]];

  el.innerHTML=`
<div style="background:#fff;border-bottom:1px solid #e8e6df;display:flex;flex-shrink:0">
  <button onclick="state.potView='targets';state.potSearch='';renderPotentials(document.getElementById('content'))" style="flex:1;padding:11px 8px;font-size:12px;font-weight:${state.potView==='targets'?'600':'400'};border:none;border-bottom:${state.potView==='targets'?'2.5px solid #6B2D3E':'2.5px solid transparent'};background:none;cursor:pointer;color:${state.potView==='targets'?'#6B2D3E':'#888'}">🎯 Potansiyel (${targets.length})</button>
  <button onclick="state.potView='dormant';state.potSearch='';renderPotentials(document.getElementById('content'))" style="flex:1;padding:11px 8px;font-size:12px;font-weight:${state.potView==='dormant'?'600':'400'};border:none;border-bottom:${state.potView==='dormant'?'2.5px solid #e24b4a':'2.5px solid transparent'};background:none;cursor:pointer;color:${state.potView==='dormant'?'#e24b4a':'#888'}">🔔 Sessiz Müşteri (${dormant.length})</button>
</div>
<div class="search-bar">
  <input type="text" placeholder="${state.potView==='dormant'?'Sessiz müşteri ara…':'Hedef ara — firma, şehir, kişi…'}" value="${state.potSearch}" oninput="state.potSearch=this.value;renderPotentials(document.getElementById('content'))">
</div>
${state.potView==='targets'?`
<div class="pills" id="pot-pills">${targetCats.map(c=>`<button class="pill${state.potCat===c?' on':''}" onclick="state.potCat='${c}';render()">${c}</button>`).join('')}<span style="display:inline-block;width:20px"></span></div>
<div style="display:flex;gap:6px;padding:8px 16px;background:#fff;border-bottom:1px solid #e8e6df;overflow-x:auto;white-space:nowrap;-ms-overflow-style:none;scrollbar-width:none">
  ${['Tümü','A','B','C'].map(p=>`<button class="pill${state.potPrio===p?' on':''}" onclick="state.potPrio='${p}';render()" style="${p==='A'?'border-color:#e24b4a;'+(state.potPrio==='A'?'background:#e24b4a;color:#fff;':''):''}${p==='B'?'border-color:#ba7517;'+(state.potPrio==='B'?'background:#ba7517;color:#fff;':''):''}">${p==='Tümü'?'Tüm Öncelikler':'Öncelik '+p}</button>`).join('')}<span style="display:inline-block;width:20px"></span>
</div>`:''}
<div style="padding:8px 16px;font-size:12px;color:#999">${filtered.length} kayıt${state.potView==='targets'?' · '+aCount+' öncelik A':' · son 6 ayda sipariş yok'}</div>
<div style="padding:0 16px">
${filtered.map(p=>{
  const st=potState[p.id]||p.status;
  const sts=STATUS_STYLES[st]||STATUS_STYLES['Aranmadı'];
  if(state.potView==='dormant'){
    const isDormant=p.name.includes('⚠️');
    const borderCol=isDormant?'#e24b4a':'#ba7517';
    return `<div class="card" style="border-left:3px solid ${borderCol}">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;margin-bottom:2px">${p.name.replace('🔔 ','').replace('⚠️ ','')}</div>
      <div style="font-size:12px;color:#888">${p.city}</div>
      <div style="font-size:12px;color:#aaa;margin-top:4px;font-style:italic">${p.note}</div>
    </div>
    <select class="badge-status" onchange="potState[${p.id}]=this.value;savePotStatusToSheets(${p.id},this.value);renderPotentials(document.getElementById('content'))" style="background:${sts.bg};color:${sts.c};border:1px solid ${sts.c}30;flex-shrink:0">
      ${Object.keys(STATUS_STYLES).map(s=>`<option${st===s?' selected':''}>${s}</option>`).join('')}
    </select>
  </div>
</div>`;
  }
  return `<div class="card prio-${p.prio.toLowerCase()}">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
        <span style="font-size:13px;font-weight:700">${p.name}</span>
        <span class="badge badge-${p.prio.toLowerCase()}">${p.prio}</span>
        ${p.nrw?'<span class="badge badge-nrw">NRW</span>':''}
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">${p.city}${p.standorte?` · ${p.standorte}`:''}</div>
      ${p.addr?`<div class="contact-row"><span class="contact-key">Adres</span><span class="contact-val">${p.addr}</span></div>`:''}
      ${p.phone?`<div class="contact-row"><span class="contact-key">Tel</span><span class="contact-val"><a href="tel:${p.phone}">${p.phone}</a></span></div>`:''}
      ${p.email?`<div class="contact-row"><span class="contact-key">E-Mail</span><span class="contact-val"><a href="mailto:${p.email}">${p.email}</a></span></div>`:''}
      ${p.contact?`<div class="contact-row"><span class="contact-key">Kişi</span><span class="contact-val">${p.contact}</span></div>`:''}
      ${p.buying?`<div class="contact-row"><span class="contact-key">İletişim</span><span class="contact-val">${p.buying}</span></div>`:''}
      <div style="font-size:12px;color:#aaa;margin-top:6px;font-style:italic">${p.note}</div>
    </div>
    <select class="badge-status" onchange="potState[${p.id}]=this.value;savePotStatusToSheets(${p.id},this.value);renderPotentials(document.getElementById('content'))" style="background:${sts.bg};color:${sts.c};border:1px solid ${sts.c}30;flex-shrink:0;max-width:108px">
      ${Object.keys(STATUS_STYLES).map(s=>`<option${st===s?' selected':''}>${s}</option>`).join('')}
    </select>
  </div>
</div>`;
}).join('')}
${state.potView==='targets'?`${state.showAddForm?`
<div class="card" style="border-left:3px solid #6B2D3E;margin-top:4px">
  <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#6B2D3E">+ Yeni Hedef Ekle</div>
  <div class="form-row"><label class="form-label">Ad / Firma *</label><input type="text" id="nf-name" placeholder="Örn: Restaurant Athen"></div>
  <div class="form-row"><label class="form-label">Şehir *</label><input type="text" id="nf-city" placeholder="Örn: Köln"></div>
  <div class="form-row"><label class="form-label">Adres</label><input type="text" id="nf-addr" placeholder="Hauptstr. 12, 50667 Köln"></div>
  <div class="form-row"><label class="form-label">Telefon</label><input type="text" id="nf-phone" placeholder="0221 123456"></div>
  <div class="form-row"><label class="form-label">E-Mail</label><input type="text" id="nf-email" placeholder="info@..."></div>
  <div class="form-row"><label class="form-label">Kategori</label>
    <select id="nf-cat">
      <option>🍽 Restoranlar</option><option>🥩 Steakhauslar</option>
      <option>🛒 Kiosk & Market</option><option>🍷 Wein-Depot & Şarap Evleri</option>
      <option>🏪 Grosshandel & Online</option>
    </select></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="form-row"><label class="form-label">Öncelik</label>
      <select id="nf-prio"><option value="A">A — Yüksek</option><option value="B" selected>B — Orta</option><option value="C">C — Düşük</option></select></div>
    <div class="form-row"><label class="form-label">NRW?</label>
      <select id="nf-nrw"><option value="true">Evet</option><option value="false" selected>Hayır</option></select></div>
  </div>
  <div class="form-row"><label class="form-label">Not</label><textarea id="nf-note" rows="2" placeholder="Kısa not..."></textarea></div>
  <div style="display:flex;gap:8px">
    <button class="btn-save" onclick="saveNewPotential()">Kaydet</button>
    <button class="btn-ghost" onclick="state.showAddForm=false;renderPotentials(document.getElementById(\'content\'))">İptal</button>
  </div>
</div>`:`<button onclick="state.showAddForm=true;renderPotentials(document.getElementById(\'content\'))" style="width:100%;padding:12px;font-size:13px;font-weight:500;border:1px dashed #c0bdb5;border-radius:10px;background:none;cursor:pointer;color:#888;font-family:inherit;margin-top:4px">+ Yeni Hedef Ekle</button>`}`:''}
<div style="height:20px"></div>
</div>`;
}

function saveNewPotential(){
  var name=document.getElementById('nf-name').value.trim();
  var city=document.getElementById('nf-city').value.trim();
  if(!name||!city){alert('Ad ve şehir zorunlu!');return;}
  var entry={
    id:nextManualId++,
    cat:document.getElementById('nf-cat').value,
    name:name,city:city,
    addr:document.getElementById('nf-addr').value.trim(),
    phone:document.getElementById('nf-phone').value.trim(),
    email:document.getElementById('nf-email').value.trim(),
    contact:'',buying:'Yerinde ziyaret',
    note:document.getElementById('nf-note').value.trim(),
    prio:document.getElementById('nf-prio').value,
    status:'Aranmadı',
    nrw:document.getElementById('nf-nrw').value==='true'
  };
  manualPotentials.push(entry);
  potState[entry.id]=entry.status;
  saveManualPotToSheets(entry);
  state.showAddForm=false;
  renderPotentials(document.getElementById('content'));
}

// ====== INIT ======
render();
loadFromSheets();
</script>
</body>
